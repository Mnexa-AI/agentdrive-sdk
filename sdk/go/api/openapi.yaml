  /v0/upload/{token}:
    put:
      description: |-
        Streams an artifact body into AgentDrive using a single-use token that was previously minted by the `upload_url` MCP tool. The token encodes the artifact path, content type, size cap, labels, metadata, source, actor, change summary, and `if_match` — all frozen at mint time. The request carries only the raw bytes + a `Content-Type` header that must match the signed value.

        **Auth.** No Authorization header — the token in the path is the credential.

        **Single-use.** Replay returns 409 TOKEN_REPLAYED. Expiry returns 401 TOKEN_EXPIRED. Bodies exceeding the signed cap return 413 BYTES_LIMIT.
      operationId: stream_upload_v0_upload__token__put
      parameters:
      - explode: false
        in: path
        name: token
        required: true
        schema:
          title: Token
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "400":
          description: Content-Type mismatch or other validation failure
        "401":
          description: Token invalid / expired / drive deleted
        "403":
          description: Path reserved for the system (WIKI_RESERVED)
        "409":
          description: Token already consumed (replay)
        "412":
          description: If-Match precondition failed
        "413":
          description: Body exceeded signed max_bytes or drive quota
        "429":
          description: Drive's per-hour write budget exhausted
        "503":
          description: Storage backend unavailable (STORAGE_FAILURE)
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Proxied streaming upload (via an upload_url token)
  /v0/uploads:
    post:
      description: "Reserve quota and open a resumable upload session for a file larger\
        \ than the buffered-upload limit. Returns a `upload_url` to PUT the raw bytes\
        \ to DIRECTLY (no Authorization header — the URL is the credential), then\
        \ call `/v0/uploads/{upload_id}/commit`. All artifact decisions (path, labels,\
        \ metadata, source, if_match) are frozen here."
      operationId: begin_upload_v0_uploads_post
      parameters:
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
