        sub-threshold artifacts or when signing is unavailable. The URL is opaque:
        callers should not parse it. See large-download-design.md §5.1.
      example:
        download_url: download_url
        direct: true
        expires_at: 2000-01-23T04:56:07.000+00:00
        size_bytes: 0
        content_type: content_type
        filename: filename
      properties:
        download_url:
          title: Download Url
          type: string
        direct:
          title: Direct
          type: boolean
        expires_at:
          format: date-time
          nullable: true
          type: string
        size_bytes:
          title: Size Bytes
          type: integer
        content_type:
          title: Content Type
          type: string
        filename:
          title: Filename
          type: string
      required:
      - content_type
      - direct
      - download_url
      - filename
      - size_bytes
      title: DownloadUrlOut
