openapi: 3.1.0
info:
  description: "AgentDrive is an agent-focused artifact store: upload by path, share\
    \ by rendered URL, address by stable permalink. The REST surface is documented\
    \ here; the rendered viewer + agent claim flow live under `agentdrive.run`."
  title: AgentDrive
  version: 0.0.1
servers:
- description: Production
  url: https://api.agentdrive.run
- description: Local dev
  url: http://127.0.0.1:8000
paths:
  /v0/artifacts/{path}:
    delete:
      operationId: delete_artifact_v0_artifacts__path__delete
      parameters:
      - explode: false
        in: path
        name: path
        required: true
        schema:
          title: Path
          type: string
        style: simple
      - explode: false
        in: header
        name: if-match
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete Artifact
    put:
      description: |-
        Upload an artifact at the given path. The path is treated as the artifact's location in the drive — re-uploading the same path overwrites in place (idempotent).

        **Limits:** request body must not exceed **50 MB**. Path must be non-empty, ≤256 chars, only `[A-Za-z0-9_./-]`, no `..` segments, no leading/trailing slash. Per-token write rate limit: 100/hour.

        **Optional headers.** Each preserves the existing artifact's value when omitted on an overwrite, and takes the create-default on a new path; send the header to replace it:
        - `X-AgentDrive-Labels`: comma-separated labels (e.g. `draft,report`); an empty value clears them. Each: lowercase `[a-z0-9_-]+`, ≤64 chars; ≤16 labels per artifact.
        - `X-AgentDrive-Metadata`: JSON object of agent-attached fields.
        - `X-AgentDrive-Source`: JSON `{"refs": [...]}` source provenance (present, including `{"refs": []}`, replaces).
        - `X-AgentDrive-Actor`: caller-supplied actor name (≤64 chars) for event-log attribution. Untrusted; never used for authz.
      operationId: put_artifact_v0_artifacts__path__put
      parameters:
      - explode: false
        in: path
        name: path
        required: true
        schema:
          title: Path
          type: string
        style: simple
      - explode: false
        in: header
        name: content-type
        required: false
        schema:
          default: application/octet-stream
          title: Content-Type
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-labels
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-metadata
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-source
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-change-summary
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: if-match
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Upload (or overwrite) an artifact
  /v0/artifacts/{art_id}:
    delete:
      description: |-
        Soft-delete the artifact with this `art_…` ID. Same semantics + response shape as the path-based `DELETE /v0/artifacts/{path}` (reversible until the GC cron hard-deletes at `purge_at`; `restore_url` points at the by-id restore), but keys on the immutable id so a concurrent rename can't change the target.

        Returns 404 ARTIFACT_NOT_FOUND if no live artifact has this id; 403 WIKI_RESERVED for `_wiki/` artifacts (system-managed); 412 if `If-Match` doesn't match the current version. Declared before the `{path:path}` family so the id convertor wins for DELETEs.
      operationId: delete_artifact_by_id_route_v0_artifacts__art_id__delete
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: header
        name: if-match
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Soft-delete an artifact by its stable ID
    get:
      operationId: get_artifact_by_id_v0_artifacts__art_id__get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Canonical lookup of an artifact by its stable ID
    patch:
      description: |-
        Move the artifact to a new path on the same drive. ID, version history, source refs, labels, metadata, and the underlying CAS blob are preserved — only `path` and `updated_at` change.

        Returns 409 PATH_CONFLICT if the target path is already taken. Use `X-AgentDrive-Actor` to attach attribution to the emitted `artifact.renamed` event.
      operationId: rename_artifact_route_v0_artifacts__art_id__patch
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: if-match
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameIn"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Rename / move an artifact to a new path
  /v0/artifacts/{art_id}/meta:
    get:
      operationId: get_artifact_by_id_meta_v0_artifacts__art_id__meta_get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Artifact metadata by stable ID (same shape as path /meta)
  /v0/artifacts/{art_id}/copy:
    post:
      description: |-
        Create a new artifact at `path` whose bytes are identical to the source artifact's. The copy reuses the source's CAS object (zero new storage) but gets a fresh `art_…` ID, a fresh version 1, and — by default — `source.refs = [{type: 'artifact', id: '<source>'}]` so provenance is preserved.

        Quota: the copy's `size_bytes` is added to the drive's `storage_bytes` even though physical bytes are shared.

        Returns 409 PATH_CONFLICT if the target path is already taken; 413 STORAGE_QUOTA_EXCEEDED if the copy would push the drive over its limit.
      operationId: copy_artifact_route_v0_artifacts__art_id__copy_post
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopyIn"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: "Duplicate an artifact to a new path (CAS-shared, new ID)"
  /v0/artifacts/{art_id}/download:
    get:
      operationId: download_artifact_by_id_v0_artifacts__art_id__download_get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Stream the artifact bytes by stable ID (never rendered HTML)
  /v0/artifacts/{art_id}/versions:
    get:
      description: Returns versions in descending `version_number` order. Cursor pagination
        via `?cursor=<token>`; `next_cursor` is non-null when the page is full and
        more older versions may exist.
      operationId: list_artifact_versions_v0_artifacts__art_id__versions_get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          description: Restore at this path instead of the original. Soft-deletes
            the live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
            Mutually exclusive with `overwrite`.
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionPage"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: "List versions of an artifact, newest first"
  /v0/artifacts/{art_id}/versions/{version_number}:
    get:
      operationId: get_artifact_version_v0_artifacts__art_id__versions__version_number__get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: path
        name: version_number
        required: true
        schema:
          title: Version Number
          type: integer
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Metadata for a specific version of an artifact
  /v0/artifacts/{art_id}/versions/{version_number}/download:
    get:
      operationId: download_artifact_version_v0_artifacts__art_id__versions__version_number__download_get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: path
        name: version_number
        required: true
        schema:
          title: Version Number
          type: integer
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Stream bytes for a specific version (machine surface)
  /v0/artifacts/{art_id}/download-url:
    get:
      description: "Returns a URL for the artifact's bytes. For large artifacts (>=\
        \ the signed-download threshold) when signing is available, it's a short-lived\
        \ **signed GCS URL** the client fetches directly (`direct:true`, `expires_at`\
        \ set); otherwise the **proxy** `/download` URL (`direct:false`). Treat the\
        \ URL as opaque. large-download-design.md §5.1."
      operationId: download_url_by_id_v0_artifacts__art_id__download_url_get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Signed direct-from-GCS download URL by stable ID
  /v0/artifacts/{art_id}/versions/{version_number}/download-url:
    get:
      description: "Same as `/{art_id}/download-url` but for a specific version's\
        \ bytes (`direct:true` signed GCS URL when large + signing available, else\
        \ the proxy `/versions/{n}/download` URL). large-download-design.md §5.1."
      operationId: download_url_version_v0_artifacts__art_id__versions__version_number__download_url_get
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - explode: false
        in: path
        name: version_number
        required: true
        schema:
          title: Version Number
          type: integer
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Signed direct-from-GCS download URL for a specific version
  /v0/artifacts/{path}/download-url:
    get:
      description: "Same as `/{art_id}/download-url` but resolves the artifact by\
        \ path. The returned proxy URL (when `direct:false`) still points at the by-id\
        \ `/download` endpoint. large-download-design.md §5.1."
      operationId: download_url_by_path_v0_artifacts__path__download_url_get
      parameters:
      - explode: false
        in: path
        name: path
        required: true
        schema:
          title: Path
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Signed direct-from-GCS download URL by path
  /v0/artifacts/{path}/meta:
    get:
      operationId: get_artifact_meta_v0_artifacts__path__meta_get
      parameters:
      - explode: false
        in: path
        name: path
        required: true
        schema:
          title: Path
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Artifact Meta
  /v0/artifacts/{art_id}/restore:
    post:
      description: Clear `deleted_at` + `purge_at` on a soft-deleted artifact. Available
        only while the artifact is in trash (i.e. before the GC cleanup cron purges
        it). Returns 404 if the artifact is live or already hard-deleted; 409 PATH_OCCUPIED
        if its path is now occupied by another live artifact. The 409 payload includes
        a `restore_options` block with `rename_to` and `force_overwrite` URLs the
        caller can follow to resolve the conflict — see deletion-design.md §5.4.
      operationId: restore_artifact_v0_artifacts__art_id__restore_post
      parameters:
      - explode: false
        in: path
        name: art_id
        required: true
        schema:
          title: Art Id
          type: string
        style: simple
      - description: Restore at this path instead of the original. Soft-deletes the
          live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
          Mutually exclusive with `overwrite`.
        explode: true
        in: query
        name: rename
        required: false
        schema:
          description: Restore at this path instead of the original. Soft-deletes
            the live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
            Mutually exclusive with `overwrite`.
          nullable: true
          type: string
        style: form
      - description: Soft-delete the live occupant at the original path and restore
          there. Audit `metadata.cause='restore_conflict_overwrite'`. Mutually exclusive
          with `rename`.
        explode: true
        in: query
        name: overwrite
        required: false
        schema:
          default: false
          description: Soft-delete the live occupant at the original path and restore
            there. Audit `metadata.cause='restore_conflict_overwrite'`. Mutually exclusive
            with `rename`.
          title: Overwrite
          type: boolean
        style: form
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Restore a soft-deleted artifact
  /v0/drives/{drive_id}:
    delete:
      description: |-
        Mark the drive for cleanup. All tenant data (artifacts, versions, wiki, embeddings, events) is hidden via the `live_*` views and CASCADE-removed by the GC cleanup cron at `purge_at`. Restore via `POST /v0/drives/{id}/restore` while the row is still in trash. The path-param `drive_id` MUST match the authenticated drive.

        Accepts either an `ad_live_` per-drive key (deletes that key's drive) or an `ad_user_` user token selecting an owned drive (workspaces-design §5.3); a `read`-scope user token is rejected with 403 `INSUFFICIENT_SCOPE`. **Guard (§8):** a workspace must retain at least one live drive — deleting the workspace's last live drive returns 409 `LAST_DRIVE`.
      operationId: delete_drive_route_v0_drives__drive_id__delete
      parameters:
      - explode: false
        in: path
        name: drive_id
        required: true
        schema:
          title: Drive Id
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Soft-delete a drive
    patch:
      description: Rename a drive. **Owner only** — a drive id that isn't yours returns
        404 (no-leak). Requires a `full`-scope user token.
      operationId: rename_drive_route_v0_drives__drive_id__patch
      parameters:
      - explode: false
        in: path
        name: drive_id
        required: true
        schema:
          title: Drive Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriveRenameIn"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Rename a drive you own
      tags:
      - drives
  /v0/drives/{drive_id}/restore:
    post:
      description: Clear `deleted_at` + `purge_at` on a soft-deleted drive. Soft-deleted
        child artifacts get their retention window rebased to the drive-restore moment
        (see deletion-design.md §5.2). Available only while the drive is in trash.
        Returns 404 if the drive is live or already hard-deleted.
      operationId: restore_drive_route_v0_drives__drive_id__restore_post
      parameters:
      - explode: false
        in: path
        name: drive_id
        required: true
        schema:
          title: Drive Id
          type: string
        style: simple
      - explode: false
        in: header
        name: x-agentdrive-actor
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
