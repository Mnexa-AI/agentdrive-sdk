        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveList"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List the drives you can see
      tags:
      - drives
    post:
      description: |-
        Create a named drive. Any **member** of the workspace may create one; the creator becomes its **owner**. Requires a `full`-scope user token. The response carries the drive's `ad_live_` API key **once** (`api_key`) — store it now, it is never returned again (rotate via `POST /v0/drives/{id}/keys/rotate`).

        The target workspace is the user's active organization (`users.default_org`); cross-workspace creation names no other workspace in v0.

        A member may own at most a fixed number of drives per workspace (workspaces-design §4.5). A caller at the limit is blocked with `403 DRIVE_LIMIT_REACHED`; this is a hard cap, not a paywall.
      operationId: create_drive_route_v0_drives_post
      parameters:
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriveCreateIn"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveCreateOut"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create a drive in your active workspace
      tags:
      - drives
  /v0/drives/{drive_id}/keys/rotate:
    post:
      description: Generate a fresh `ad_live_` key for a drive you own and invalidate
        the old one immediately. **Owner only** (404 no-leak otherwise) and requires
        a `full`-scope user token. The new key is returned **once** — store it now.
      operationId: rotate_drive_key_route_v0_drives__drive_id__keys_rotate_post
      parameters:
      - explode: false
        in: path
        name: drive_id
        required: true
        schema:
          title: Drive Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
