    get:
      description: "Returns drive **metadata** (workspaces-design §4.2): an **admin**\
        \ sees the whole active workspace's drive inventory (every owner); a **member**\
        \ sees only the drives they own. Metadata only — owner, size, timestamps —\
        \ never a raw API key, and never an authorization to read a drive's contents.\
        \ A `read`-scope token may call this; mutations require `full`."
      operationId: list_drives_route_v0_drives_get
      parameters:
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
