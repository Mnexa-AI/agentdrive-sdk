          default: all
          enum:
          - public
          - private
          - all
          title: Visibility
          type: string
        style: form
      - explode: true
        in: query
        name: modality
        required: false
        schema:
          items:
            description: Restore at this path instead of the original. Soft-deletes
              the live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
              Mutually exclusive with `overwrite`.
            nullable: true
            type: string
          title: Modality
          type: array
          default: null
        style: form
      - explode: true
        in: query
        name: updated_after
        required: false
