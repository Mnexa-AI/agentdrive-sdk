      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Body_authorize_decision_oauth2_authorize_post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Authorize Decision
      tags:
      - mcp-oauth-ui
  /auth/extension/start:
    get:
      description: |-
        Begin a WorkOS sign-in flow on behalf of a Chrome extension.

        Stamps `for=ext` + `ext_id` into the signed OAuth state so the
        callback handler knows to render the extension handoff page
        instead of setting a session cookie.

        Three short-circuits, all surface as actionable errors:
          * EXTENSION_AUTH_DISABLED (503): kill switch flipped off.
          * UNKNOWN_EXTENSION (400): `ext_id` not on the allow-list.
          * Missing `ext_id` query string (400 INVALID_REQUEST).
      operationId: extension_start_auth_extension_start_get
      parameters:
      - explode: true
        in: query
        name: ext_id
        required: false
        schema:
          description: Restore at this path instead of the original. Soft-deletes
            the live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
            Mutually exclusive with `overwrite`.
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Extension Start
  /auth/login:
    get:
      description: |-
        Begin a WorkOS sign-in flow.

        Mints a pre-login state cookie (binds the OAuth flow to this
        browser — defense-in-depth against login-CSRF), signs a state
        payload, and redirects to AuthKit. The hosted AuthKit page lets
        the user pick Google OAuth, Microsoft OAuth, magic-link,
        password, or passkey; we don't care which — they all funnel
        back to /auth/callback with a `code` we exchange in D2.
      operationId: login_auth_login_get
      parameters:
      - explode: true
        in: query
        name: return_to
        required: false
        schema:
          description: Restore at this path instead of the original. Soft-deletes
            the live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
            Mutually exclusive with `overwrite`.
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Login
  /auth/callback:
    get:
      description: |-
        Complete a WorkOS sign-in.

        Three failure modes the route is responsible for shaping into
        user-readable errors:
          * Missing/mismatched state cookie or signed state — LOGIN_FLOW_INVALID
            (400). Almost always means the user took >10 minutes on the
            AuthKit page or copy-pasted the callback URL into a different
            browser.
          * `authenticate_with_code` raises — AUTH_CODE_INVALID (400). The
            code was consumed or invalid; the user re-initiates and gets
            a fresh code.
          * `sync_from_workos` raises — WORKOS_UNAVAILABLE (502) with
            Retry-After: 30. WorkOS API call failed AFTER the code was
            consumed; local DB is untouched (sync_from_workos opens its
            tx after the WorkOS call returns).
      operationId: callback_auth_callback_get
      parameters:
      - explode: true
        in: query
        name: code
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: state
        required: false
        schema:
          description: Restore at this path instead of the original. Soft-deletes
            the live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
            Mutually exclusive with `overwrite`.
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: error
        required: false
        schema:
          description: Restore at this path instead of the original. Soft-deletes
            the live occupant at the original path with audit `metadata.cause='restore_conflict_rename'`.
            Mutually exclusive with `overwrite`.
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Callback
  /auth/logout:
    post:
      description: |-
        Terminate both the local session AND the upstream WorkOS session.

        Without the WorkOS-side termination, the next `/auth/login` flow
        silently re-authenticates the user through AuthKit's still-valid
        session cookie on `api.workos.com` — "Sign out" feels broken and
        a shared-browser user can't switch accounts. The recommended
        pattern (per https://workos.com/docs/authkit/sessions) is to
        redirect to the WorkOS logout endpoint with the `sid` we stashed
        during the callback; WorkOS clears its own session and returns
        the browser to our `return_to`.

        Failure modes handled:
          * No `workos_session_id` in the session (legacy v2 cookie issued
            before this slice landed): fall back to local-only logout. The
            upstream session lingers but the user's local state is cleared
            — same UX as before this slice; cookie rotation on next sign-in
            eventually overwrites it.
          * SDK raises during `get_logout_url`: pure string formatting at
            WorkOS's end, so the only realistic failure is a misconfigured
            WorkOS dashboard (no Sign-out redirect registered). We catch
            and fall back to local-only logout rather than 500ing — the
            user clicked "Sign out", they should land somewhere, not on an
            error page.
      operationId: logout_auth_logout_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Body_logout_auth_logout_post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Logout
  /auth/recovery:
    get:
      description: |-
        Show the recover-or-start-fresh decision. Requires a valid
        `pending_recovery` payload — direct hits without one bounce to
        /auth/login (the recovery state is only meaningful inside the
        callback → recovery → resolve chain).
      operationId: recovery_page_auth_recovery_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Recovery Page
  /auth/recovery/restore:
    post:
      description: |-
        Recover the soft-deleted account. Undelete cascade runs in
        `onboarding.recover_account`; on success we set the normal
        session and bounce to /dashboard. If the retention window has
        lapsed between page-render and POST (the GC raced us), surface
        the same "expired" redirect so the user lands somewhere
        actionable.
      operationId: recovery_restore_auth_recovery_restore_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Body_recovery_restore_auth_recovery_restore_post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Recovery Restore
  /auth/recovery/new-account:
    post:
      description: |-
        Start fresh under the same WorkOS identity. JIT-provisions a
        new user / org / drive via the same `sync_from_workos` the happy
        path uses; the soft-deleted record stays in trash with its
        original purge_at until the GC sweeps it. Land on /welcome so
        the user sees the freshly-minted API key once.

        Tab-concurrency note: if the user has /auth/recovery open in two
        tabs and clicks Recover in tab A then Start fresh in tab B, this
        handler sees a pending_recovery payload whose
        `soft_deleted_user_id` is now LIVE (tab A's restore won). The
        `sync_from_workos` upsert on `workos_user_id` will UPDATE the
        live row's mutable fields instead of INSERTing — i.e., the
        second tab's Start-fresh effectively no-ops because the
        partial-unique-index arbiter is no longer filtered out by
        `deleted_at IS NULL`. End user is still signed in correctly as
        the recovered user; the second tab's audit event reflects the
        declined intent even though no new row was minted. Acceptable
        drift; not worth distributed locking for.
      operationId: recovery_new_account_auth_recovery_new_account_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Body_recovery_new_account_auth_recovery_new_account_post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Recovery New Account
  /auth/recovery/new-account-expired:
    get:
      description: |-
        Friendly landing for the rare race where the soft-deleted row
        has been hard-purged between callback and recovery-page render.
        Clears the recovery cookie (only when one is present) and tells
        the user to retry — fresh sign-in will JIT-provision cleanly
        since no soft-deleted record blocks it any more.

        Gated on `pending_recovery` so a normal signed-in user who
        navigates here directly doesn't get their session wiped. Without
        a pending payload there's nothing to expire; bounce home.
      operationId: recovery_new_account_expired_auth_recovery_new_account_expired_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Recovery New Account Expired
  /web/artifacts/indexed:
    get:
      description: |-
        Session-auth companion to `/v0/artifacts/{path}/meta` used by the
        wiki-banner poller in the browser. The poller runs in any logged-in
        owner's tab; the v0 endpoint requires Bearer auth and was therefore
        dead for browser owners (the banner spinner never resolved).

        Returns `{indexed_at, has_index}` so the poller can detect when the
        extraction finishes and reload the page. 401 if not signed in (anon
        viewer); 404 if the path doesn't exist in the caller's drive.

        Rate limit is generous (120/min) because the banner polls every 5s and
        a user might leave multiple tabs open. Per-IP keying so one abusive
        client doesn't starve out concurrent legit polls from other users.
      operationId: web_artifact_indexed_web_artifacts_indexed_get
      parameters:
      - explode: true
        in: query
        name: path
        required: true
        schema:
          maxLength: 512
          title: Path
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Web Artifact Indexed
  /web/projects/{fld_id}/preview:
    get:
      description: |-
        Session-auth poll for the live PDF preview page (latex-live-preview-
        design.md §4.2). The browser uses the session cookie (the `/v0` jobs API
        is Bearer-only), so this is the cookie-authed companion. Returns the
        current compile status + the last successful PDF + diagnostics so the page
        updates in place. 401 if not signed in; 404 (not 403) if the folder isn't
        in the caller's drive, to avoid existence leakage.
      operationId: web_project_preview_web_projects__fld_id__preview_get
      parameters:
      - explode: false
        in: path
        name: fld_id
        required: true
        schema:
