        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadBeginOut"
          description: Successful Response
        "400":
          description: Invalid path / labels / metadata / source
        "402":
          description: Drive storage quota would be exceeded
        "403":
          description: Path reserved for the system (WIKI_RESERVED)
        "413":
          description: size_bytes exceeds the drive's per-artifact cap
        "429":
          description: Drive's per-hour write budget exhausted
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Begin a large (direct-to-GCS) upload
  /v0/uploads/{upload_id}/commit:
    post:
      description: "Finalize the upload begun at `/v0/uploads`: AgentDrive verifies\
        \ the object that landed in GCS (size + checksum) and creates the artifact.\
        \ Idempotent — a retry after a successful commit returns the same artifact.\
        \ The write budget is charged here (begin is free metadata)."
      operationId: commit_upload_v0_uploads__upload_id__commit_post
      parameters:
      - explode: false
        in: path
        name: upload_id
        required: true
        schema:
          title: Upload Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactOut"
          description: Successful Response
        "404":
          description: No such upload for this drive
        "409":
          description: Uploaded object size != declared size_bytes
        "410":
          description: Upload session expired
        "412":
          description: If-Match precondition failed
        "429":
          description: Drive's per-hour write budget exhausted
        "422":
          content:
