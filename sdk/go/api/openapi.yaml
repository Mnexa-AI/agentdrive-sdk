      title: SourceRef
    TokenResponse:
      description: |-
        `POST /oauth2/token` success response. Mirrors RFC 6749 with
        an optional `identity_assertion` field for the claim grant path
        (where a fresh post-claim assertion supersedes the pre-claim
        one).
      example:
        access_token: access_token
        token_type: Bearer
        expires_in: 0
        scope: scope
        identity_assertion: identity_assertion
      properties:
        access_token:
          title: Access Token
          type: string
        token_type:
          default: Bearer
          title: Token Type
          type: string
        expires_in:
          description: Seconds until access_token expiry.
          title: Expires In
          type: integer
        scope:
          title: Scope
          type: string
        identity_assertion:
          nullable: true
          type: string
      required:
      - access_token
      - expires_in
      - scope
      title: TokenResponse
    UploadBeginIn:
      description: |-
        Body of `POST /v0/uploads` — the large-upload begin call (large-upload-
        design.md §5.1). All artifact decisions are frozen here; the subsequent
        GCS PUT carries only bytes, and `commit` carries only the `upload_id`.

        `labels`/`metadata`/`source` omitted (null) ⇒ preserve the existing
        artifact's value at commit; present (incl. empty) ⇒ replace.
      example:
        path: path
        content_type: application/octet-stream
        size_bytes: 1
        crc32c: crc32c
        labels:
        - labels
        - labels
        metadata:
          key: ""
        source: ""
        actor_name: actor_name
        change_summary: change_summary
        if_match: 6
        cors_origin: cors_origin
      properties:
        path:
          title: Path
          type: string
        content_type:
          default: application/octet-stream
          title: Content Type
          type: string
        size_bytes:
          minimum: 1.0
          title: Size Bytes
          type: integer
        crc32c:
          nullable: true
          type: string
        labels:
          items:
            type: string
          nullable: true
          type: array
          default: null
        metadata:
          additionalProperties: true
          nullable: true
          type: object
        source:
          allOf:
          - $ref: "#/components/schemas/ArtifactSource"
          nullable: true
        actor_name:
          nullable: true
          type: string
        change_summary:
          nullable: true
          type: string
        if_match:
          nullable: true
          type: integer
        cors_origin:
          description: "Web origin (scheme://host[:port]) of the browser that will\
            \ PUT the bytes, e.g. `https://app.example.com`. Set this when the `upload_url`\
            \ is handed to browser code: GCS binds CORS at session initiate, so the\
            \ returned session only echoes `Access-Control-Allow-Origin` (and is thus\
            \ PUT-able from a browser) when opened with the caller's origin. A trusted\
            \ backend relaying a browser upload forwards the browser's `Origin` here.\
            \ Omit for server/desktop uploads (no CORS enforcement)."
          nullable: true
          type: string
      required:
      - path
      - size_bytes
      title: UploadBeginIn
    UploadBeginOut:
      description: |-
        Response of `POST /v0/uploads`. PUT the bytes to `upload_url` (no auth
        header — the URL is the credential), then `POST .../commit`.
      example:
        upload_id: upload_id
        upload_url: upload_url
        method: PUT
        headers:
          key: headers
        expires_at: 2000-01-23T04:56:07.000+00:00
        max_bytes: 0
      properties:
        upload_id:
          title: Upload Id
          type: string
        upload_url:
          title: Upload Url
          type: string
        method:
          default: PUT
          enum:
          - PUT
          title: Method
          type: string
        headers:
          additionalProperties:
            type: string
          title: Headers
        expires_at:
          format: date-time
          title: Expires At
          type: string
        max_bytes:
          title: Max Bytes
          type: integer
      required:
      - expires_at
      - headers
      - max_bytes
      - upload_id
      - upload_url
      title: UploadBeginOut
