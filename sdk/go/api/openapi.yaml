              schema:
                type: string
          description: Successful Response
      summary: Feedback Form
    post:
      description: |-
        Validate, charge the feedback budget, insert the ticket,
        redirect with a flash.

        Validation runs BEFORE the quota charge so users get clear field
        errors without burning budget. The ticket insert is LLM-free and
        GitHub-free (§5.2) — the triage lane picks it up on its next tick.
      operationId: feedback_submit_feedback_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Body_feedback_submit_feedback_post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Feedback Submit
