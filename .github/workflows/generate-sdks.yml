name: Generate SDKs

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC

permissions:
  contents: write

concurrency:
  group: generate-sdks
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest OpenAPI spec
        run: curl -sSf https://api.agentdrive.run/openapi.json -o sdk/openapi.json

      - name: Generate SDKs
        run: bash scripts/generate-sdks.sh sdk/openapi.json

      - name: Commit regenerated SDKs
        run: |
          git config user.name  "agentdrive-bot"
          git config user.email "support@agentdrive.run"
          git add -A
          if git diff --cached --quiet; then
            echo "No SDK changes."
          else
            git commit -m "chore(sdk): regenerate from openapi.json"
            git push
          fi
